name: Matrix Build
on: push
jobs:
    test_python:
        strategy:
            matrix:
                python-version: ["3.10", "3.11", "3.12"]
        runs-on: ubuntu-latest
        steps:
            - name: Code checkout
              uses: actions/checkout@v7

            - name: Install Python
              uses: actions/setup-python@v6
              with:
                  python-version: ${{matrix.python-version}}

            - name: Print python version
              run: python --version
