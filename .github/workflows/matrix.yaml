name: Matrix Build
on: push
jobs:
    test_python:
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.10", "3.11", "3.12"]
                os: ["ubuntu-latest", "windows-latest"]
                exclude:
                    - os: "windows-latest"
                      python-version: "3.10"
        runs-on: ${{matrix.os}}
        steps:
            - name: Code checkout
              uses: actions/checkout@v7

            - name: Install Python
              uses: actions/setup-python@v6
              with:
                  python-version: ${{matrix.python-version}}

            - name: Print python version
              shell: bash
              run: |
                  python --version
                  if [ "${{matrix.python-version}}" == "3.11" ]; then
                    exit 1;
                  fi
