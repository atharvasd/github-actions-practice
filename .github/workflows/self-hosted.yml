name: Self-hosted runner
on: [workflow_dispatch]
jobs:
  local_job:
    runs-on: self-hosted
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Print hostname
        run: hostname

      - name: Print working directory
        run: pwd

      - name: Create a magic file
        run: touch i-was-here.txt
