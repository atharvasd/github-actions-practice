name: My First Workflow
on:
  push:
  schedule:
    - cron: "0 0 * * *"

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Say Hello
        run: echo "Hello from GitHub Actions!"

      - name: Print Current date
        run: echo $(date)

      - name: Print baranch date
        run: echo ${{github.ref_name}}

      - name: List the files
        run: ls -a

      - name: Print runners OS info
        run: uname -a
